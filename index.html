<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VeriPhoto Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #status { color: #555; margin-top: 10px; font-weight: bold; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Certificador VeriPhoto</h1>
    
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <button class="btn" onclick="document.getElementById('cameraInput').click()">📸 CAPTURAR EVIDENCIA</button>
    
    <div id="status">Esperando captura...</div>
    <button class="btn" onclick="subirEvidencia()" style="background: #28a745; margin-top: 20px;">CERTIFICAR Y SUBIR</button>

    <script type="module" src="app.js"></script>
</body>
</html>
