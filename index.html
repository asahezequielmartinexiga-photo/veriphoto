<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriPhoto Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #btnPrincipal { height: 80px; font-size: 1.4rem; font-weight: bold; border-radius: 15px; }
        .status-box { font-size: 0.9rem; border-radius: 10px; padding: 10px; margin-bottom: 20px; }
    </style>
    
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-md-6 text-center">
            <div class="card p-4">
                <h2 class="mb-4 text-primary"><i class="bi bi-shield-check"></i> VeriPhoto Pro</h2>
                
                <div id="status" class="status-box bg-light text-muted">
                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                    Buscando señal GPS...
                </div>

                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
                
                <button id="btnPrincipal" class="btn btn-primary w-100 shadow" onclick="document.getElementById('cameraInput').click()" disabled>
                    <i class="bi bi-camera-fill me-2"></i> CAPTURAR Y CERTIFICAR
                </button>

                <p class="mt-4 text-secondary small">La evidencia se certificará automáticamente al tomar la foto.</p>
            </div>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

<script type="module" src="app.js"></script>
</body>
</html>
