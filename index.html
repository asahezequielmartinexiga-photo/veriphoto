<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>VeriPhoto Pro</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">

    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Certificador VeriPhoto</h1>
    
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <button class="btn" onclick="document.getElementById('cameraInput').click()">📸 CAPTURAR EVIDENCIA</button>
    
    <div id="status">Esperando captura...</div>
    <button class="btn" onclick="subirEvidencia()" style="background: #28a745; margin-top: 20px;">CERTIFICAR Y SUBIR</button>

    <script type="module" src="app.js"></script>
</body>
</html>
